<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #1a1d22;
      color: #fff;
      padding: 16px;
    }

    .hidden { display: none; }

    .card {
      background: #22262c;
      padding: 12px;
      border-radius: 12px;
      margin-top: 12px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      color: #ffd36a;
      font-weight: 700;
    }

    .order {
      padding: 8px;
      border-bottom: 1px solid #333;
      font-size: 14px;
    }

    .ok {
      color: #4caf50;
    }
  </style>
</head>

<body>

<h2>🔐 Admin Panel</h2>

<div id="denied">❌ Нет доступа</div>

<div id="panel" class="hidden">

  <!-- 📊 СТАТА -->
  <div class="card">
    <h3>📊 Статистика</h3>

    <div class="stat">
      <span>Заказов:</span>
      <span id="ordersCount">0</span>
    </div>

    <div class="stat">
      <span>Звёзды:</span>
      <span id="starsCount">0 ⭐</span>
    </div>

    <div class="stat">
      <span>Доход:</span>
      <span id="income">0 ₽</span>
    </div>
  </div>

  <!-- 📦 ЗАКАЗЫ -->
  <div class="card">
    <h3>📦 Последние заказы</h3>
    <div id="orders">Загрузка...</div>
  </div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const tg = window.Telegram.WebApp;
tg.ready();

const ADMIN_ID = 1444520038;

// 🔐 доступ
const user = tg.initDataUnsafe?.user;

if (!user || user.id !== ADMIN_ID) {
  document.getElementById("denied").style.display = "block";
} else {
  document.getElementById("denied").style.display = "none";
  document.getElementById("panel").classList.remove("hidden");

  loadData();
}

// Supabase
const supabase = createClient(
  "https://naxxslgxyelefzdxjhze.supabase.co",
  "YOUR_ANON_KEY"
);

// 🔥 ЗАГРУЗКА ДАННЫХ
async function loadData() {

  const { data: orders } = await supabase
    .from("orders")
    .select("*")
    .order("id", { ascending: false });

  if (!orders) return;

  // 📦 список заказов
  document.getElementById("orders").innerHTML =
    orders.slice(0, 20).map(o => `
      <div class="order">
        👤 ${o.username || "—"} |
        ⭐ ${o.stars} |
        💰 ${o.amount_rub}₽
      </div>
    `).join("");

  // 📊 стата
  const totalOrders = orders.length;
  const totalStars = orders.reduce((a, b) => a + (b.stars || 0), 0);
  const totalIncome = orders.reduce((a, b) => a + (b.amount_rub || 0), 0);

  document.getElementById("ordersCount").textContent = totalOrders;
  document.getElementById("starsCount").textContent = totalStars + " ⭐";
  document.getElementById("income").textContent = totalIncome.toFixed(2) + " ₽";
}
</script>

</body>
</html>
