<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ошибка оплаты</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #16161a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #E6E6E6;
    }

    .container {
      text-align: center;
      padding: 24px;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: #3a1e1e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      border: 2px solid #f55e5e;
      box-shadow: 0 0 30px rgba(245, 94, 94, 0.3);
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f55e5e;
    }

    p {
      font-size: 14px;
      color: #A0A0A0;
      margin-bottom: 24px;
    }

    .btn {
      display: inline-block;
      padding: 12px 32px;
      border-radius: 12px;
      background: #2D6BFF;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      margin: 0 6px;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #A0A0A0;
    }

    .countdown {
      font-size: 12px;
      color: #A0A0A0;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">❌</div>
    <h1>Ошибка оплаты</h1>
    <p>Что-то пошло не так. Попробуйте ещё раз или выберите другой способ оплаты.</p>
    <a href="https://t.me/MyStarsSupport812_bot" class="btn">Вернуться в бот</a>
    <div class="countdown" id="timer">Автовозврат через 3 сек...</div>
  </div>

  <script>
    let sec = 3;
    const timer = document.getElementById("timer");
    const interval = setInterval(() => {
      sec--;
      if (sec <= 0) {
        clearInterval(interval);
        window.location.href = "https://t.me/MyStarsSupport812_bot";
      } else {
        timer.textContent = `Автовозврат через ${sec} сек...`;
      }
    }, 1000);
  </script>
</body>
</html>
