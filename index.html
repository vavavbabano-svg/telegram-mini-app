<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyStars — Купить Telegram Stars</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<main class="app">
    <header class="header">
        <h1 class="header__title">MyStars</h1>
    </header>

    <section class="star-section">
        <div class="star-container">
            <div class="star-glow star-glow--outer"></div>
            <div class="star-glow star-glow--inner"></div>
            <div class="spark spark--1"></div>
            <div class="spark spark--2"></div>
            <div class="spark spark--3"></div>
            <div class="spark spark--4"></div>
            <div class="spark spark--5"></div>
            <img src="img/tgstars.png" alt="Telegram Stars" class="star-icon" style="width: 88px; height: 88px; object-fit: contain;">
        </div>
    </section>

    <section class="text-section">
        <h2 class="text-section__title">Купить Telegram Stars</h2>
        <p class="text-section__subtitle">Быстрая и безопасная покупка звёзд<br>для вас или вашего друга</p>
    </section>

    <section class="form-section">
        <div class="card" id="usernameCard">
            <label class="card__label">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="card__label-text">Имя пользователя</span>
            </label>
            <input type="text" id="username" class="card__input" placeholder="@username" autocomplete="off">
            <div class="card__hint"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>Укажите username получателя звёзд</div>
        </div>

        <div class="card">
            <div class="card__label"><img src="img/tgstars.png" alt="Stars" style="width: 18px; height: 18px; object-fit: contain;"><span class="card__label-text">Количество звёзд</span></div>
            <div class="quantity">
                <button class="quantity__btn" id="btnMinus">−</button>
                <span class="quantity__value" id="quantityDisplay">100</span>
                <button class="quantity__btn" id="btnPlus">+</button>
            </div>
        </div>
    </section>

    <div class="summary">
        <div><span class="summary__label">К оплате <strong id="summaryQty">100</strong> звёзд</span><br><span class="summary__rate">1 звезда = 1,59 ₽</span></div>
        <strong class="summary__price" id="totalPrice">159,00 ₽</strong>
    </div>

    <button class="button" id="purchaseBtn"><img src="img/tgstars.png" alt="⭐" style="width: 20px; height: 20px; object-fit: contain;"> <span id="btnText">Купить 100 звёзд</span> <img src="img/tgstars.png" alt="⭐" style="width: 20px; height: 20px; object-fit: contain;"></button>

    <footer class="footer"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span>Безопасная оплата</span></footer>
</main>

<script type="module" src="app.js"></script>
</body>
</html>
