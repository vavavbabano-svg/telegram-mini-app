<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stars App</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* Синхронизация с темой Telegram */
    body {
      background: var(--tg-theme-bg-color, #1e1e24);
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal-card {
      background: var(--tg-theme-bg-color, #0F0F14);
      border-radius: 32px;
      padding: 24px 20px;
      max-width: 320px;
      width: 85%;
      text-align: center;
      border: 1px solid var(--tg-theme-hint-color, #2A2A35);
    }
    .modal-card h3 { font-size: 20px; margin-bottom: 12px; color: var(--tg-theme-text-color, white); }
    .modal-card p { font-size: 14px; color: var(--tg-theme-hint-color, #aaa); margin-bottom: 20px; }
    .modal-buttons { display: flex; gap: 12px; }
    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 60px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .modal-btn.confirm { background: var(--tg-theme-button-color, #2C6EDB); color: var(--tg-theme-button-text-color, white); }
    .modal-btn.cancel { background: #2A2A35; color: white; }
  </style>
  <script>
    // Принудительная синхронизация с Telegram WebApp
    if (window.Telegram && Telegram.WebApp) {
      const tg = Telegram.WebApp;
      tg.ready();
      tg.expand();

      // Применяем цвета Telegram
      const bgColor = tg.themeParams.bg_color || '#1e1e24';
      const textColor = tg.themeParams.text_color || '#ffffff';
      const hintColor = tg.themeParams.hint_color || '#aaaaaa';
      const buttonColor = tg.themeParams.button_color || '#2C6EDB';
      const buttonTextColor = tg.themeParams.button_text_color || '#ffffff';
      const headerBg = tg.themeParams.header_bg_color || bgColor;

      // Устанавливаем CSS-переменные
      document.documentElement.style.setProperty('--tg-theme-bg-color', bgColor);
      document.documentElement.style.setProperty('--tg-theme-text-color', textColor);
      document.documentElement.style.setProperty('--tg-theme-hint-color', hintColor);
      document.documentElement.style.setProperty('--tg-theme-button-color', buttonColor);
      document.documentElement.style.setProperty('--tg-theme-button-text-color', buttonTextColor);
      document.documentElement.style.setProperty('--tg-theme-header-bg-color', headerBg);
      
      document.body.style.backgroundColor = bgColor;
      tg.setHeaderColor(headerBg);
      tg.setBackgroundColor(bgColor);

      // Слушаем смену темы
      tg.onEvent('themeChanged', () => {
        const newBg = tg.themeParams.bg_color || '#1e1e24';
        const newText = tg.themeParams.text_color || '#ffffff';
        const newHint = tg.themeParams.hint_color || '#aaaaaa';
        const newButton = tg.themeParams.button_color || '#2C6EDB';
        const newButtonText = tg.themeParams.button_text_color || '#ffffff';
        const newHeader = tg.themeParams.header_bg_color || newBg;
        
        document.documentElement.style.setProperty('--tg-theme-bg-color', newBg);
        document.documentElement.style.setProperty('--tg-theme-text-color', newText);
        document.documentElement.style.setProperty('--tg-theme-hint-color', newHint);
        document.documentElement.style.setProperty('--tg-theme-button-color', newButton);
        document.documentElement.style.setProperty('--tg-theme-button-text-color', newButtonText);
        document.documentElement.style.setProperty('--tg-theme-header-bg-color', newHeader);
        
        document.body.style.backgroundColor = newBg;
        tg.setHeaderColor(newHeader);
        tg.setBackgroundColor(newBg);
      });
    }
  </script>
</head>
<body>

<div class="app">
  <!-- TOP -->
  <div class="topbar">
    <div id="userId">#----</div>
    <div class="logo"></div>
    <div class="topbar-right">
      <button id="adminBtn" class="admin-btn hidden">Admin</button>
      <a class="tg-btn" href="https://t.me/MyStars812support_bot?start=help" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Telegram_X_2019_Logo.svg" />
      </a>
    </div>
  </div>

  <div class="card hero">
    <div class="hero-img">
      <img src="img/звездаглав2.png" alt="Stars">
    </div>
  </div>

  <div class="card">
    <div class="row">
      <input id="username" placeholder="@username">
      <button id="selfBtn" class="btn small active">Себе</button>
      <button id="otherBtn" class="btn small">Другому</button>
    </div>
  </div>

  <div class="card">
    <div class="price-line">
      <input id="stars" type="number" placeholder="50" value="50">
      <span class="price-label">Stars</span>
      <img src="img/стрелка2.png" alt="→" class="arrow-icon">
      <div id="rubOut">82.00 ₽</div>
      <span class="price-label" id="currencyLabel">RUB</span>
    </div>
    <div class="packs">
      <button data-stars="50">50</button>
      <button data-stars="100">100</button>
      <button data-stars="500">500</button>
      <button data-stars="1000">1K</button>
      <button data-stars="5000">5K</button>
    </div>
  </div>

  <div class="card">
    <div class="payment-grid">
      <div class="pay-card" data-method="sbp">
        <div class="currency-tag">₽ RUB</div>
        <div class="payment-logo"><img src="img/СБП.png" alt="СБП"></div>
        <div class="payment-name">СБП</div>
      </div>
      <div class="pay-card" data-method="ton">
        <div class="currency-tag">TON</div>
        <div class="payment-logo"><img src="img/TON12.png" alt="TON"></div>
        <div class="payment-name">TON</div>
      </div>
    </div>
  </div>

  <div class="terms">
    <a href="terms.html">Правила</a> ·
    <a href="privacy.html">Политика</a> ·
    <a href="refund.html">Возврат</a> ·
    <a href="requirements.html">О магазине</a>
  </div>

  <button id="buyButton" class="buy" style="display:flex;align-items:center;justify-content:center;width:100%; border:none;">Купить звёзды</button>
</div>

<script>
  // --- Telegram WebApp ---
  let tg = null;
  if (window.Telegram && window.Telegram.WebApp) {
    tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
  }

  // --- DOM ---
  const starsInput = document.getElementById('stars');
  const rubOutDiv = document.getElementById('rubOut');
  const selfBtn = document.getElementById('selfBtn');
  const otherBtn = document.getElementById('otherBtn');
  const usernameField = document.getElementById('username');
  const buyButton = document.getElementById('buyButton');
  const packButtons = document.querySelectorAll('.packs button');

  const RUB_PER_STAR = 1.64;

  function updateTotal() {
    let stars = parseInt(starsInput.value);
    if (isNaN(stars) || stars < 1) stars = 1;
    starsInput.value = stars;
    rubOutDiv.innerHTML = `${(stars * RUB_PER_STAR).toFixed(2)} ₽`;
  }

  function setTarget(target) {
    if (target === 'self') {
      usernameField.disabled = true;
      if (tg && tg.initDataUnsafe?.user?.username) {
        usernameField.value = `@${tg.initDataUnsafe.user.username}`;
      }
      selfBtn.classList.add('active');
      otherBtn.classList.remove('active');
    } else {
      usernameField.disabled = false;
      selfBtn.classList.remove('active');
      otherBtn.classList.add('active');
    }
  }

  selfBtn.addEventListener('click', () => setTarget('self'));
  otherBtn.addEventListener('click', () => setTarget('other'));
  starsInput.addEventListener('input', updateTotal);
  packButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const stars = btn.getAttribute('data-stars');
      if (stars) starsInput.value = stars;
      updateTotal();
    });
  });
  updateTotal();
  setTarget('self');

  // Плашка подтверждения
  function showConfirmModal(onConfirm) {
    const old = document.querySelector('.modal-overlay');
    if (old) old.remove();

    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal-card">
        <h3>🛒 Подтверждение заказа</h3>
        <p>Вы действительно хотите купить <strong>${starsInput.value}</strong> звёзд за <strong>${rubOutDiv.innerText}</strong>?</p>
        <div class="modal-buttons">
          <button class="modal-btn cancel" id="modalCancel">Отмена</button>
          <button class="modal-btn confirm" id="modalConfirm">Подтвердить</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('modalCancel').onclick = () => modal.remove();
    document.getElementById('modalConfirm').onclick = () => {
      modal.remove();
      onConfirm();
    };
  }

  // ГЛАВНОЕ: покупка → запрос к API → открытие ссылки от ЮKassa
  buyButton.onclick = () => {
    let recipient = usernameField.value.trim();
    if (!recipient) {
      if (selfBtn.classList.contains('active')) {
        recipient = 'свой аккаунт';
      } else {
        alert('Укажите @username получателя');
        return;
      }
    }

    const stars = parseInt(starsInput.value);
    const totalText = rubOutDiv.innerText;
    const order = { recipient, stars, total: totalText, target: selfBtn.classList.contains('active') ? 'self' : 'other', timestamp: Date.now() };
    localStorage.setItem('pendingOrder', JSON.stringify(order));

    showConfirmModal(async () => {
      const amount = parseFloat(totalText.replace(/[^0-9.,]/g, '').replace(',', '.'));
      try {
        const res = await fetch('https://yookassa-api.vavavbabano.workers.dev/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, description: `Покупка ${stars} звёзд для ${recipient}` })
        });
        const data = await res.json();

        if (data.success && data.confirmation_url) {
          // Обычный редирект — как работала Lava
          window.location.href = data.confirmation_url;
        } else {
          alert('Ошибка: ' + (data.error || 'Не удалось создать платёж'));
        }
      } catch (err) {
        alert('Ошибка соединения: ' + err.message);
      }
    });
  };
</script>
</body>
</html>
