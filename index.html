<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stars App</title>

  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

  <div class="topbar">
    <div id="userId">#</div>
  </div>

  <!-- BUY -->
  <div id="screenBuy" class="screen active">

    <div class="title-image">
      <img src="img/звезда12.jpg" alt="">
    </div>

    <div class="card">

      <input id="username" placeholder="Username">

      <div class="toggle">
        <button id="selfBtn" class="active">Себе</button>
        <button id="otherBtn">Другому</button>
      </div>

    </div>

    <div class="card">

      <input id="stars" type="number" placeholder="Количество звёзд">

      <div class="packs">
        <button onclick="setStars(50)"><img src="img/тгзвезда21.png">50</button>
        <button onclick="setStars(100)"><img src="img/тгзвезда21.png">100</button>
        <button onclick="setStars(500)"><img src="img/тгзвезда21.png">500</button>
        <button onclick="setStars(1000)"><img src="img/тгзвезда21.png">1000</button>
        <button onclick="setStars(5000)"><img src="img/тгзвезда21.png">5000</button>
      </div>

    </div>

    <div class="calc">
      <span id="starsOut">0 ⭐</span>
      <span id="rubOut">0 ₽</span>
    </div>

    <button class="buy">Купить</button>

  </div>

  <!-- SELL -->
  <div id="screenSell" class="screen">
    <h1>Продажа</h1>
  </div>

  <!-- REF -->
  <div id="screenRef" class="screen">
    <h1>Рефералы</h1>
  </div>

  <!-- TAB -->
  <div class="tabbar">
    <button class="tab active" id="tabBuy">Покупка</button>
    <button class="tab" id="tabSell">Продажа</button>
    <button class="tab" id="tabRef">Рефералы</button>
  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
