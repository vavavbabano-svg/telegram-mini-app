<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stars App</title>

  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="topbar">
  <div id="userId">#</div>

  <a href="https://t.me/your_bot" target="_blank">
    <img class="tg-icon" src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Telegram_X_2019_Logo.svg">
  </a>
</div>

<div class="screen active">

  <div class="title-image">
    <img src="img/звезда12.jpg">
  </div>

  <div class="card">

    <input id="username" placeholder="Username">

    <div class="toggle">
      <button id="selfBtn" class="active">Себе</button>
      <button id="otherBtn">Другому</button>
    </div>

  </div>

  <div class="stars-block">

    <div class="stars-input-wrap">
      <input id="stars" type="number" placeholder="Количество звёзд">
      <div class="price-indicator">
        <span id="rubOut">0 ₽</span>
      </div>
    </div>

    <div class="packs">
      <button data-stars="50">50</button>
      <button data-stars="100">100</button>
      <button data-stars="500">500</button>
      <button data-stars="1000">1000</button>
      <button data-stars="5000">5000</button>
    </div>

  </div>

  <button class="buy">Купить</button>

  <button id="adminBtn" class="admin-btn hidden">Админка</button>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
