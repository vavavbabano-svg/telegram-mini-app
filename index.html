
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stars App</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div id="userId">#</div>

    <a class="support" href="https://t.me/your_bot" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Telegram_X_2019_Logo.svg" class="tg-icon">
    </a>
  </div>

  <!-- SCREENS WRAPPER -->

  <!-- BUY SCREEN -->
  <div id="screenBuy" class="screen active">

    <div class="title-image">
  <img src="img/звезда12.jpg" alt="stars">
</div>

<div class="user-block">

  <input id="username" placeholder="Username">

  <div class="toggle">
    <button id="selfBtn" class="active">Себе</button>
    <button id="otherBtn">Другому</button>
  </div>

</div>

    <div class="stars-block">
      <input id="stars" type="number" placeholder="Количество звёзд">

      <div class="packs">
        <button onclick="setStars(50)">50</button>
        <button onclick="setStars(100)">100</button>
        <button onclick="setStars(500)">500</button>
        <button onclick="setStars(1000)">1000</button>
        <button onclick="setStars(5000)">5000</button>
      </div>
    </div>

    <div class="calc">
      <span id="starsOut">0 ⭐</span>
      <span id="rubOut">0 ₽</span>
    </div>

    <button class="buy">Купить</button>

  </div>

  <!-- SELL SCREEN -->
  <div id="screenSell" class="screen">
    <h1>💸 Продажа</h1>
    <p>Здесь будет продажа звёзд</p>
  </div>

  <!-- REF SCREEN -->
  <div id="screenRef" class="screen">
    <h1>👥 Рефералы</h1>
    <p>Здесь будет реферальная система</p>
  </div>

  <!-- TAB BAR -->
  <div class="tabbar">

    <button class="tab active" id="tabBuy">Покупка</button>
    <button class="tab" id="tabSell">Продажа</button>
    <button class="tab" id="tabRef">Рефералы</button>

  </div>

  <!-- IMPORTANT: JS MUST BE HERE -->
  <script type="module" src="app.js"></script>

</body>
</html>
