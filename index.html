<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stars App</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div id="userId">#1</div>

    <a class="support" href="https://t.me/your_bot" target="_blank">
<div class="tg-btn">
  <img src="img/telegram-svgrepo-com.svg">
</div>

  <!-- MAIN -->
  <div class="container">

    <h1>⭐ Buy Stars</h1>

    <input id="username" placeholder="Username">

    <div class="toggle">
      <button class="active">Себе</button>
      <button>Другому</button>
    </div>

    <div class="stars-block">

      <input id="stars" type="number" placeholder="Количество звёзд">

      <div class="packs">
        <button onclick="setStars(50)">50</button>
        <button onclick="setStars(100)">100</button>
        <button onclick="setStars(500)">500</button>
        <button onclick="setStars(1000)">1000</button>
        <button onclick="setStars(5000)">5000</button>
      </div>

    </div>

    <div class="calc">
      <span id="starsOut">0 ⭐</span>
      <span id="rubOut">0 ₽</span>
    </div>

    <button class="buy">Купить</button>

  </div>

  <!-- MODAL (ПРАВИЛЬНО ВНИЗУ) -->
  <div class="modal hidden" id="modal">
    <div class="modal-box">
      <h2>Подтверждение</h2>

      <p id="confirmText"></p>

      <div class="timer" id="timer">5</div>

      <button id="confirmBtn">Подтвердить</button>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
