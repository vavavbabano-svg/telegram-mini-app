<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stars App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="image-container">
            <img src="img/R.png" alt="Telegram Stars" class="main-image">
        </div>
        <h1>Купить <span>Telegram Stars</span></h1>
        <p>Быстрая и безопасная покупка звёзд для вас или вашего друга</p>
    </div>

    <div class="input-group">
        <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-blue)"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <div class="input-content">
            <span class="input-label">Имя пользователя</span>
            <input type="text" id="username" placeholder="@username">
        </div>
    </div>

    <div class="input-group">
        <div class="input-icon">
            <img src="img/tgstars.png" alt="Stars" style="width: 24px; height: 24px; object-fit: contain;">
        </div>
        <div class="input-content">
            <span class="input-label">Количество звёзд</span>
            <input type="number" id="star-count" class="quantity-value" value="100" min="50" step="50">
        </div>
    </div>

    <div class="price-section">
        <div>
            <span class="price-label">К оплате</span><br>
            <span style="font-size: 12px; color: var(--text-secondary);" id="summary-label">100 звёзд</span>
        </div>
        <div class="price-value">
            <span id="total-price">159.00</span> ₽
            <span class="price-subtext">1 звезда ≈ 1.59 ₽</span>
        </div>
    </div>

    <button id="buyButton" class="buy-button">
        <img src="img/R.png" style="width:18px;height:18px;object-fit:contain;"> Купить <span id="btn-count">100</span> звёзд
    </button>

    <div class="footer-links">
        <a href="terms.html" class="footer-link">Правила</a>
        <a href="privacy.html" class="footer-link">Политика</a>
        <a href="refund.html" class="footer-link">Возврат</a>
        <a href="requirements.html" class="footer-link">О магазине</a>
    </div>

    <div class="footer">
        <div class="lock-icon"></div>
        Безопасная оплата
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
