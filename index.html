<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stars App</title>

  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="app">

  <!-- TOP -->
<div class="topbar">
  <div id="userId">#----</div>
  <div class="logo"></div>
  <div class="topbar-right">
    <button id="adminBtn" class="admin-btn hidden">Admin</button>
    <a class="tg-btn" href="https://t.me/MyStars812support_bot" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Telegram_X_2019_Logo.svg" />
    </a>
  </div>
</div>

<!-- HERO -->
<div class="card hero">
  <div class="hero-img">
    <img src="img/звездаглав2.png" alt="Stars">
  </div>
</div>

  <!-- USER -->
  <div class="card">

    <div class="row">
      <input id="username" placeholder="@username">
      <button id="selfBtn" class="btn small active">Себе</button>
      <button id="otherBtn" class="btn small">Другому</button>
    </div>

  </div>

  <!-- STARS -->
  <div class="card">
    <div class="price-line">
      <input id="stars" type="number" placeholder="50" value="50">
      <span class="price-label">Stars</span>
      <img src="img/стрелка2.png" alt="→" class="arrow-icon">
      <div id="rubOut">82.00 ₽</div>
      <span class="price-label" id="currencyLabel">RUB</span>
    </div>

    <div class="packs">
      <button data-stars="50">50</button>
      <button data-stars="100">100</button>
      <button data-stars="500">500</button>
      <button data-stars="1000">1K</button>
      <button data-stars="5000">5K</button>
    </div>

  </div>

  <!-- PAYMENTS -->
  <div class="card">
    <div class="payment-grid">
      <!-- СБП -->
      <div class="pay-card" data-method="sbp">
        <div class="currency-tag">₽ RUB</div>
        <div class="payment-logo">
          <img src="img/СБП.png" alt="СБП">
        </div>
        <div class="payment-name">СБП</div>
      </div>

      <!-- TON -->
      <div class="pay-card" data-method="ton">
        <div class="currency-tag">TON</div>
        <div class="payment-logo">
          <img src="img/TON12.png" alt="TON">
        </div>
        <div class="payment-name">TON</div>
      </div>
    </div>
  </div>

  <!-- TERMS -->
  <div class="terms">
    Покупая, вы соглашаетесь с <span>правилами</span>
  </div>

</div>

<!-- BUY -->
<button class="buy">Купить звёзды</button>

<!-- МОДАЛЬНОЕ ОКНО -->
<div class="modal-overlay" id="paymentModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-close" id="modalClose">&times;</span>
    </div>
    <div class="modal-body">
      <p class="modal-title">Оплата заказа</p>
      <p class="modal-amount" id="modalAmount">⭐ 50 → 82.00 ₽</p>
      <div class="qr-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/QR_code_for_mobile_English_Wikipedia.svg" alt="QR-код" id="qrCode">
      </div>
      <p class="modal-hint">Отсканируйте QR-код или переведите по реквизитам</p>
      <p class="modal-timer" id="modalTimer">Ожидание оплаты... (автопереход через 5 сек)</p>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
