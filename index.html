<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stars</title>

  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div class="app">

  <!-- TOP -->
  <div class="topbar">
    <div class="user-id" id="userId">#----</div>
    <div class="logo">⭐ Stars</div>
  </div>

  <!-- HERO -->
  <div class="hero card">
    <div class="hero-img"></div>
  </div>

  <!-- USER -->
  <div class="card">

    <div class="row">
      <input id="username" placeholder="@username">
      <button id="selfBtn" class="btn small active">Себе</button>
      <button id="otherBtn" class="btn small">Другому</button>
    </div>

  </div>

  <!-- STARS -->
  <div class="card">

    <div class="price-line">
      <input id="stars" type="number" placeholder="Stars">
      <div id="rubOut">0 ₽</div>
    </div>

    <div class="packs">
      <button data-stars="50">50</button>
      <button data-stars="100">100</button>
      <button data-stars="500">500</button>
      <button data-stars="1000">1K</button>
      <button data-stars="5000">5K</button>
    </div>

  </div>

  <!-- PAYMENTS -->
  <div class="card">

    <div class="grid">
      <div class="pay">TON</div>
      <div class="pay">SBP</div>
      <div class="pay">VISA</div>
      <div class="pay">MC</div>
      <div class="pay">Crypto</div>
      <div class="pay">CS2</div>
    </div>

  </div>

  <!-- TERMS -->
  <div class="terms">
    Покупая, вы соглашаетесь с <span>правилами</span>
  </div>

</div>

<!-- BUY BTN -->
<button class="buy">Купить звёзды</button>

<button id="adminBtn" class="admin-btn hidden">Admin</button>

<script type="module" src="app.js"></script>
</body>
</html>
