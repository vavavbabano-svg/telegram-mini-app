<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Оплата — MyStars</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #040406;
      font-family: system-ui, sans-serif;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #0F0F14;
      border-radius: 28px;
      padding: 24px;
      max-width: 450px;
      width: 100%;
    }
    .order {
      background: #0B0B10;
      border-radius: 20px;
      padding: 16px;
      margin: 20px 0;
    }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
    }
    .pay-btn {
      width: 100%;
      background: #2C6EDB;
      border: none;
      padding: 16px;
      border-radius: 48px;
      font-size: 17px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }
    .back {
      display: block;
      margin-top: 20px;
      color: #8E94B0;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="card">
  <h2>💳 Оплата заказа</h2>

  <div class="order">
    <div class="row"><span>Товар:</span><span>Звёзды Telegram</span></div>
    <div class="row"><span>Получатель:</span><span id="recipient"></span></div>
    <div class="row"><span>Количество:</span><span id="stars"></span></div>
    <div class="row"><span>Сумма:</span><span id="total"></span></div>
  </div>

  <button class="pay-btn" id="payBtn">Оплатить картой</button>
  <a href="index.html" class="back">← Вернуться</a>
</div>

<script>
  const order = JSON.parse(localStorage.getItem('pendingOrder') || '{}');
  document.getElementById('recipient').innerText = order.recipient || '—';
  document.getElementById('stars').innerText = order.stars || '—';
  document.getElementById('total').innerText = order.total || '— ₽';

  let amount = 100;
  const match = (order.total || '').match(/(\d+(?:[.,]\d+)?)/);
  if (match) amount = parseFloat(match[1].replace(',', '.'));
  if (isNaN(amount) || amount < 1) amount = 100;

  const description = `Покупка ${order.stars} звёзд для ${order.recipient || 'аккаунта'}`;

  const payBtn = document.getElementById('payBtn');
  payBtn.onclick = async () => {
    payBtn.disabled = true;
    payBtn.innerText = '⏳ Создание...';

    try {
      const res = await fetch('/api/create-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount, description })
      });
      const data = await res.json();
      if (data.success && data.confirmation_url) {
        window.location.href = data.confirmation_url;
      } else {
        throw new Error(data.error || 'Ошибка');
      }
    } catch (err) {
      alert('❌ Ошибка: ' + err.message);
      payBtn.disabled = false;
      payBtn.innerText = 'Оплатить картой';
    }
  };
</script>
</body>
</html>
