<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Оплата — MyStars</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1E1E1E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #E6E6E6;
      padding: 20px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .payment-card {
      max-width: 500px;
      width: 100%;
      background: #242424;
      border-radius: 28px;
      padding: 24px 20px;
      text-align: center;
    }
    .order-info {
      background: #2E2E2E;
      border-radius: 20px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .order-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 0.5px solid #3A3A3A;
    }
    .total {
      font-size: 28px;
      font-weight: 700;
      color: #5ef57c;
      margin: 16px 0;
    }
    .pay-btn {
      width: 100%;
      background: #2D6BFF;
      border: none;
      padding: 16px;
      border-radius: 48px;
      font-size: 17px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }
    .pay-btn:disabled {
      opacity: 0.6;
    }
    .ton-wallet {
      background: #2E2E2E;
      border-radius: 20px;
      padding: 20px;
      margin: 16px 0;
    }
    .ton-address {
      background: #1E1E1E;
      padding: 12px;
      border-radius: 16px;
      font-family: monospace;
      word-break: break-all;
      font-size: 14px;
      margin: 12px 0;
    }
    .copy-btn {
      background: #383838;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #A0A0A0;
      font-size: 14px;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="payment-card">
  <h2>💳 Оплата заказа</h2>

  <div class="order-info">
    <div class="order-row"><span>📦 Товар:</span><span>Звёзды Telegram</span></div>
    <div class="order-row"><span>👤 Получатель:</span><span id="recipient">—</span></div>
    <div class="order-row"><span>⭐ Количество:</span><span id="starsCount">—</span></div>
  </div>

  <div class="total">💰 <span id="totalAmount">—</span></div>

  <div id="paymentArea"></div>

  <a href="index.html" class="back-link">← Вернуться к выбору</a>
</div>

<script>
  // Загрузка заказа
  let order = { recipient: 'пользователь', stars: 100, total: '164 ₽', method: 'sbp' };
  try {
    const saved = localStorage.getItem('pendingOrder');
    if (saved) {
      order = JSON.parse(saved);
    }
  } catch(e) {}

  document.getElementById('recipient').innerText = order.recipient || '—';
  document.getElementById('starsCount').innerText = order.stars || '—';
  document.getElementById('totalAmount').innerText = order.total || '— ₽';

  const paymentArea = document.getElementById('paymentArea');
  const method = order.method || 'sbp';

  if (method === 'sbp') {
    // ---------- ЮKassa (карта / СБП) ----------
    paymentArea.innerHTML = `<button class="pay-btn" id="payButton">💳 Оплатить картой или СБП</button>`;

    let amountRub = 100;
    const match = (order.total || '').match(/(\d+(?:[.,]\d+)?)/);
    if (match) amountRub = parseFloat(match[1].replace(',', '.'));

    const SHOP_ID = '1343358';
    const SECRET_KEY = 'test_NjodJO1Gkl9oRh7mCQNmPV0-p7T9ekDH4fBXDlPWR4M';
    const description = `Покупка ${order.stars} звёзд для ${order.recipient}`.substring(0, 120);

    async function createPayment() {
      const btn = document.getElementById('payButton');
      btn.disabled = true;
      btn.innerText = '⏳ Создание платежа...';

      const paymentData = {
        amount: { value: amountRub.toFixed(2), currency: 'RUB' },
        capture: true,
        confirmation: { type: 'redirect', return_url: 'https://fastmystars.ru/success.html' },
        description: description,
        metadata: { method: 'sbp' }
      };

      try {
        const response = await fetch('/yookassa-proxy.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(paymentData)
        });

        const text = await response.text();
        console.log('Сырой ответ прокси:', text);

        // Показываем ответ на странице для отладки
        const debugDiv = document.createElement('div');
        debugDiv.style.cssText = 'background:#2E2E2E; padding:10px; margin-top:20px; border-radius:12px; font-size:11px; text-align:left; word-break:break-all;';
        debugDiv.innerHTML = `<strong>Ответ прокси:</strong><br>${text.substring(0, 500)}`;
        paymentArea.appendChild(debugDiv);

        let result;
        try {
          result = JSON.parse(text);
        } catch(e) {
          alert('Ошибка: прокси вернул не JSON. Ответ: ' + text.substring(0, 200));
          btn.disabled = false;
          btn.innerText = '💳 Оплатить картой или СБП';
          return;
        }

        if (result.confirmation && result.confirmation.confirmation_url) {
          window.location.href = result.confirmation.confirmation_url;
        } else {
          throw new Error(result.description || 'Ошибка создания платежа');
        }
      } catch (err) {
        alert('Ошибка: ' + err.message);
        btn.disabled = false;
        btn.innerText = '💳 Оплатить картой или СБП';
      }
    }

    document.getElementById('payButton').addEventListener('click', createPayment);

  } else if (method === 'ton') {
    // ---------- TON кошелёк (прямой перевод) ----------
    const tonPrice = order.total || '0 TON';
    const tonAmount = parseFloat(tonPrice.replace(' TON', '').trim());
    const walletAddress = 'UQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA';

    paymentArea.innerHTML = `
      <div class="ton-wallet">
        <div style="margin-bottom: 12px;">⬇️ Оплатите точную сумму в TON</div>
        <div class="ton-address">
          📤 Адрес получателя:<br>
          <strong style="font-size: 13px; word-break: break-all;">${walletAddress}</strong>
        </div>
        <div style="margin: 16px 0;">
          <strong>Сумма к оплате: ${tonAmount.toFixed(4)} TON</strong>
        </div>
        <button class="copy-btn" id="copyTonAddress">📋 Копировать адрес</button>
        <button class="pay-btn" id="tonPaidBtn" style="margin-top: 16px;">✅ Я оплатил(а)</button>
      </div>
    `;

    document.getElementById('copyTonAddress').addEventListener('click', () => {
      navigator.clipboard.writeText(walletAddress);
      alert('Адрес кошелька скопирован');
    });

    document.getElementById('tonPaidBtn').addEventListener('click', () => {
      alert('Демо-режим: ваша оплата будет проверена вручную. Ожидайте зачисление в течение часа.');
      window.location.href = 'success.html';
    });
  }
</script>
</body>
</html>
