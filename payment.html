<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Оплата — MyStars</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #040406;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #FFFFFF;
      padding: 20px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .payment-card {
      max-width: 500px;
      width: 100%;
      background: #0F0F14;
      border-radius: 28px;
      padding: 24px 20px;
      text-align: center;
    }
    .test-badge {
      background: #FF8C42;
      color: #0F0F14;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 40px;
      display: inline-block;
      margin-bottom: 16px;
    }
    .order-info {
      background: #0B0B10;
      border-radius: 20px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .order-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 0.5px solid #2A2A35;
    }
    .total {
      font-size: 28px;
      font-weight: 700;
      color: #FFB347;
      margin: 16px 0;
    }
    .pay-btn {
      width: 100%;
      background: #2C6EDB;
      border: none;
      padding: 16px;
      border-radius: 48px;
      font-size: 17px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }
    .pay-btn:disabled {
      opacity: 0.6;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #8E94B0;
      font-size: 14px;
      text-decoration: none;
    }
    .debug {
      background: #1A1A2A;
      border-radius: 16px;
      padding: 12px;
      margin-top: 20px;
      font-size: 11px;
      color: #88AACC;
      text-align: left;
      font-family: monospace;
      word-break: break-all;
    }
  </style>
</head>
<body>
<div class="payment-card">
  <div class="test-badge">🧪 ТЕСТ</div>
  <h2>💳 Оплата заказа</h2>

  <div class="order-info">
    <div class="order-row"><span>📦 Товар:</span><span>Звёзды Telegram</span></div>
    <div class="order-row"><span>👤 Получатель:</span><span id="recipient">—</span></div>
    <div class="order-row"><span>⭐ Количество:</span><span id="starsCount">—</span></div>
  </div>

  <div class="total">💰 <span id="totalAmount">—</span></div>

  <button class="pay-btn" id="payButton">Оплатить картой (тест)</button>
  <a href="index.html" class="back-link">← Вернуться</a>

  <div class="debug" id="debugBox">⚡ Нажмите кнопку оплаты</div>
</div>

<script>
  // --- 1. ЗАГРУЗКА ЗАКАЗА ---
  let order = { recipient: 'тест', stars: 100, total: '164 ₽' };
  try {
    const saved = localStorage.getItem('pendingOrder');
    if (saved) order = JSON.parse(saved);
  } catch(e) {}

  document.getElementById('recipient').innerText = order.recipient || '—';
  document.getElementById('starsCount').innerText = order.stars || '—';
  document.getElementById('totalAmount').innerText = order.total || '— ₽';

  // --- 2. РАСЧЁТ СУММЫ ---
  let amountRub = 100;
  const match = (order.total || '').match(/(\d+(?:[.,]\d+)?)/);
  if (match) amountRub = parseFloat(match[1].replace(',', '.'));
  if (isNaN(amountRub) || amountRub <= 0) amountRub = 100;

  const description = `Покупка ${order.stars} звёзд для ${order.recipient || 'аккаунта'}`.slice(0, 120);
  const SHOP_ID = '1343358';
  const SECRET_KEY = 'test_NjodJO1Gkl9oRh7mCQNmPV0-p7T9ekDH4fBXDlPWR4M';

  // --- 3. ИНИЦИАЛИЗАЦИЯ TELEGRAM (если внутри мини-аппа) ---
  document.addEventListener('DOMContentLoaded', function() {
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      console.log('✅ Telegram WebApp готов');
    }
  });

  const debugBox = document.getElementById('debugBox');
  function debug(msg) {
    console.log(msg);
    debugBox.innerHTML = `📡 ${new Date().toLocaleTimeString()}: ${msg}`;
  }

  // --- 4. ОТПРАВКА ЗАПРОСА В ЮKASSA ---
  async function createPayment() {
    const btn = document.getElementById('payButton');
    btn.disabled = true;
    btn.innerText = '⏳ Создание...';
    debug('Отправка запроса в прокси...');

    const paymentData = {
      amount: { value: amountRub.toFixed(2), currency: 'RUB' },
      capture: true,
      confirmation: { type: 'redirect', return_url: 'https://fastmystars.ru/success.html' },
      description: description,
      metadata: { test: true }
    };

    try {
      const response = await fetch('/yookassa-proxy.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(paymentData)
      });

      debug(`HTTP статус: ${response.status}`);

      // ⚠️ ВАЖНО: читаем ответ ТОЛЬКО ОДИН РАЗ как JSON
      let result;
      try {
        result = await response.json();
      } catch (jsonError) {
        // Если не JSON — читаем как текст для отладки
        const textResponse = await response.text();
        debug(`❌ Ошибка: ответ не JSON. Текст: ${textResponse.substring(0, 200)}`);
        throw new Error('Сервер вернул не JSON');
      }

      if (result.confirmation && result.confirmation.confirmation_url) {
        debug(`✅ Редирект на оплату...`);
        window.location.href = result.confirmation.confirmation_url;
      } else {
        const errMsg = result.description || result.error || 'Неизвестная ошибка';
        debug(`❌ Ошибка от ЮKassa: ${errMsg}`);
        throw new Error(errMsg);
      }
    } catch (err) {
      debug(`❌ ${err.message}`);
      btn.disabled = false;
      btn.innerText = 'Оплатить картой (тест)';
    }
  }

  document.getElementById('payButton').addEventListener('click', createPayment);
</script>
</body>
</html>
