<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Оплата — MyStars</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1E1E1E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #E6E6E6;
      padding: 20px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .payment-card {
      max-width: 500px;
      width: 100%;
      background: #242424;
      border-radius: 28px;
      padding: 24px 20px;
      text-align: center;
    }
    .order-info {
      background: #2E2E2E;
      border-radius: 20px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .order-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 0.5px solid #A0A0A0;
    }
    .total {
      font-size: 28px;
      font-weight: 700;
      color: #5ef57c;
      margin: 16px 0;
    }
    .pay-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 20px 0;
    }
    .pay-btn {
      background: #2C6EDB;
      border: none;
      padding: 14px;
      border-radius: 48px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      width: 100%;
    }
    .pay-btn.secondary {
      background: #383838;
      color: #E6E6E6;
    }
    .warning {
      background: #4a2a2a;
      border-radius: 16px;
      padding: 16px;
      margin: 16px 0;
      color: #ff9999;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #A0A0A0;
      font-size: 14px;
      text-decoration: none;
    }
    .qr-container {
      background: white;
      border-radius: 20px;
      padding: 16px;
      margin-top: 16px;
      text-align: center;
    }
    .qr-container img {
      width: 180px;
      height: 180px;
    }
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="payment-card" id="paymentCard">
  <h2>💳 Оплата заказа</h2>
  <div class="order-info">
    <div class="order-row"><span>📦 Товар:</span><span>Звёзды Telegram</span></div>
    <div class="order-row"><span>👤 Получатель:</span><span id="recipient">—</span></div>
    <div class="order-row"><span>⭐ Количество:</span><span id="starsCount">—</span></div>
  </div>
  <div class="total">💰 <span id="totalAmount">—</span></div>

  <div id="dynamicContent"></div>

  <a href="index.html" class="back-link">← Вернуться к выбору</a>
</div>

<script>
  // Загрузка заказа из localStorage
  let order = { recipient: 'тестовый', stars: 100, total: '164 ₽', paymentMethod: 'sbp' };
  try {
    const saved = localStorage.getItem('pendingOrder');
    if (saved) order = JSON.parse(saved);
  } catch(e) {}
  // Если нет способа оплаты, ставим sbp по умолчанию
  if (!order.paymentMethod) order.paymentMethod = 'sbp';

  document.getElementById('recipient').innerText = order.recipient || '—';
  document.getElementById('starsCount').innerText = order.stars || '—';
  document.getElementById('totalAmount').innerText = order.total || '— ₽';

  const amountRub = parseFloat((order.total || '0').replace(/[^0-9.,]/g, '').replace(',', '.'));
  const description = `Покупка ${order.stars} звёзд для ${order.recipient}`;

  // Ключи ЮKassa (тестовые)
  const SHOP_ID = '1343358';
  const SECRET_KEY = 'test_NjodJO1Gkl9oRh7mCQNmPV0-p7T9ekDH4fBXDlPWR4M';

  const dynamicDiv = document.getElementById('dynamicContent');

  // Функция создания платежа через прокси
  async function createPayment(confirmationType) {
    const paymentData = {
      amount: { value: amountRub.toFixed(2), currency: 'RUB' },
      capture: true,
      confirmation: { type: confirmationType, return_url: 'https://fastmystars.ru/success.html' },
      description: description.substring(0, 100),
      metadata: { test: true, method: confirmationType }
    };
    if (confirmationType === 'qr') {
      // Для QR нужно указать confirmation_data
      paymentData.confirmation = { type: 'qr', return_url: 'https://fastmystars.ru/success.html' };
    }
    try {
      const response = await fetch('/yookassa-proxy.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(paymentData)
      });
      const result = await response.json();
      if (confirmationType === 'redirect' && result.confirmation?.confirmation_url) {
        window.location.href = result.confirmation.confirmation_url;
      } else if (confirmationType === 'qr' && result.confirmation?.confirmation_data?.qr_code) {
        const qrUrl = result.confirmation.confirmation_data.qr_code;
        const qrImg = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(qrUrl)}`;
        dynamicDiv.innerHTML = `
          <div class="qr-container">
            <img src="${qrImg}" alt="QR-код СБП">
            <button class="pay-btn secondary" id="copyQrLink" style="margin-top:12px;">📋 Скопировать ссылку</button>
          </div>
          <button class="pay-btn" id="backToOptions" style="background:#383838;">← Назад к выбору</button>
        `;
        document.getElementById('copyQrLink')?.addEventListener('click', () => {
          navigator.clipboard.writeText(qrUrl);
          alert('Ссылка СБП скопирована. Откройте её в приложении банка.');
        });
        document.getElementById('backToOptions')?.addEventListener('click', () => {
          location.reload();
        });
      } else {
        throw new Error(result.description || 'Ошибка создания платежа');
      }
    } catch (err) {
      alert('❌ Ошибка: ' + err.message);
      // Показываем кнопку назад
      dynamicDiv.innerHTML = `<button class="pay-btn" id="backToOptions" style="background:#383838;">← Назад к выбору</button>`;
      document.getElementById('backToOptions')?.addEventListener('click', () => location.reload());
    }
  }

  // Рендер в зависимости от paymentMethod
  function render() {
    if (order.paymentMethod === 'ton') {
      dynamicDiv.innerHTML = `
        <div class="warning">
          ⚠️ Оплата через TON временно недоступна.<br>
          Пожалуйста, выберите способ оплаты СБП.
        </div>
        <button class="pay-btn" id="switchToSbp">🔄 Выбрать СБП</button>
      `;
      document.getElementById('switchToSbp')?.addEventListener('click', () => {
        order.paymentMethod = 'sbp';
        localStorage.setItem('pendingOrder', JSON.stringify(order));
        render();
      });
    } else if (order.paymentMethod === 'sbp') {
      dynamicDiv.innerHTML = `
        <div class="pay-options">
          <button class="pay-btn" id="cardPay">💳 Оплатить банковской картой</button>
          <button class="pay-btn secondary" id="qrPay">📱 Оплата по QR-коду (СБП)</button>
        </div>
      `;
      document.getElementById('cardPay')?.addEventListener('click', () => createPayment('redirect'));
      document.getElementById('qrPay')?.addEventListener('click', () => createPayment('qr'));
    }
  }

  render();
</script>
</body>
</html>
