<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Оплата — MyStars</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #040406;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #FFFFFF;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .payment-card {
      max-width: 500px;
      width: 100%;
      background: #0F0F14;
      border-radius: 28px;
      padding: 24px;
      text-align: center;
    }
    .order-info {
      background: #0B0B10;
      border-radius: 20px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .order-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 0.5px solid #2A2A35;
    }
    .total {
      font-size: 28px;
      font-weight: 700;
      color: #FFB347;
      margin: 16px 0;
    }
    .pay-btn {
      width: 100%;
      background: #2C6EDB;
      border: none;
      padding: 16px;
      border-radius: 48px;
      font-size: 17px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }
    .pay-btn:disabled {
      opacity: 0.6;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #8E94B0;
      font-size: 14px;
      text-decoration: none;
    }
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="payment-card">
  <h2>💳 Оплата заказа</h2>

  <div class="order-info">
    <div class="order-row"><span>📦 Товар:</span><span>Звёзды Telegram</span></div>
    <div class="order-row"><span>👤 Получатель:</span><span id="recipient">—</span></div>
    <div class="order-row"><span>⭐ Количество:</span><span id="starsCount">—</span></div>
  </div>

  <div class="total">💰 <span id="totalAmount">—</span></div>

  <button class="pay-btn" id="createBtn">Перейти к оплате</button>
  <a href="index.html" class="back-link">← Вернуться</a>
</div>

<script>
  // Загружаем заказ из localStorage
  let order = { recipient: 'тест', stars: 100, total: '164 ₽' };
  try {
    const saved = localStorage.getItem('pendingOrder');
    if (saved) order = JSON.parse(saved);
  } catch(e) {}

  document.getElementById('recipient').innerText = order.recipient || '—';
  document.getElementById('starsCount').innerText = order.stars || '—';
  document.getElementById('totalAmount').innerText = order.total || '— ₽';

  // Извлекаем сумму в рублях
  let amountRub = 100;
  const match = (order.total || '').match(/(\d+(?:[.,]\d+)?)/);
  if (match) amountRub = parseFloat(match[1].replace(',', '.'));
  if (isNaN(amountRub) || amountRub <= 0) amountRub = 100;

  const description = `Покупка ${order.stars} звёзд для ${order.recipient || 'аккаунта'}`;

  const createBtn = document.getElementById('createBtn');

  createBtn.onclick = async () => {
    createBtn.disabled = true;
    createBtn.innerHTML = '<span class="loader"></span> Создание платежа...';

    try {
      // Запрос к твоему Cloudflare Worker
      const response = await fetch('https://yookassa-api.vavavbabano.workers.dev/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          amount: amountRub,
          description: description
        })
      });

      const data = await response.json();
      console.log('Worker response:', data);

      if (data.success && data.confirmation_url) {
        // Сохраняем ID платежа для проверки статуса в success.html
        if (data.id) localStorage.setItem('currentPaymentId', data.id);
        // Редирект на страницу оплаты ЮKassa
        window.location.href = data.confirmation_url;
      } else {
        alert('Ошибка: ' + (data.error || 'Не удалось создать платёж'));
        createBtn.disabled = false;
        createBtn.innerHTML = 'Перейти к оплате';
      }
    } catch (err) {
      console.error('Ошибка:', err);
      alert('Ошибка соединения: ' + err.message);
      createBtn.disabled = false;
      createBtn.innerHTML = 'Перейти к оплате';
    }
  };
</script>
</body>
</html>
