<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Перенаправление на оплату</title>
  <style>
    body {
      background: #040406;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .loader {
      animation: spin 1s linear infinite;
      width: 40px;
      height: 40px;
      border: 3px solid #2A2A35;
      border-top-color: #2C6EDB;
      border-radius: 50%;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div>
  <div class="loader"></div>
  <p>⏳ Перенаправление на страницу оплаты...</p>
  <p style="font-size: 12px; color: #888;">Не закрывайте страницу</p>
</div>

<script>
  const order = JSON.parse(localStorage.getItem('pendingOrder') || '{}');
  const amount = parseFloat((order.total || '0').replace(/[^0-9.,]/g, '').replace(',', '.'));
  const description = `Покупка ${order.stars} звёзд для ${order.recipient || 'аккаунта'}`;

  (async () => {
    try {
      const res = await fetch('/yookassa-proxy.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          amount: { value: amount.toFixed(2), currency: 'RUB' },
          capture: true,
          confirmation: { type: 'redirect', return_url: 'https://fastmystars.ru/success.html' },
          description: description.slice(0, 120),
          metadata: { test: true }
        })
      });
      const data = await res.json();
      if (data.confirmation?.confirmation_url) {
        window.location.href = data.confirmation.confirmation_url;
      } else {
        alert('Ошибка: ' + (data.description || 'Неизвестная ошибка'));
        window.location.href = 'index.html';
      }
    } catch (err) {
      alert('Ошибка соединения: ' + err.message);
      window.location.href = 'index.html';
    }
  })();
</script>
</body>
</html>
