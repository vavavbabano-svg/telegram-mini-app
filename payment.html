<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Оплата — MyStars</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #040406;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #FFFFFF;
      padding: 20px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .payment-card {
      max-width: 500px;
      width: 100%;
      background: #0F0F14;
      border-radius: 28px;
      padding: 24px 20px;
      text-align: center;
    }
    .test-badge {
      background: #FF8C42;
      color: #0F0F14;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 40px;
      display: inline-block;
      margin-bottom: 16px;
    }
    .order-info {
      background: #0B0B10;
      border-radius: 20px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .order-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 0.5px solid #2A2A35;
    }
    .total {
      font-size: 28px;
      font-weight: 700;
      color: #FFB347;
      margin: 16px 0;
    }
    .pay-btn {
      width: 100%;
      background: #2C6EDB;
      border: none;
      padding: 16px;
      border-radius: 48px;
      font-size: 17px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }
    .pay-btn:disabled {
      opacity: 0.6;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #8E94B0;
      font-size: 14px;
      text-decoration: none;
    }
    .debug {
      background: #1A1A2A;
      border-radius: 16px;
      padding: 12px;
      margin-top: 20px;
      font-size: 11px;
      color: #88AACC;
      text-align: left;
      font-family: monospace;
      word-break: break-all;
    }
  </style>
</head>
<body>
<div class="payment-card">
  <div class="test-badge">🧪 ТЕСТ ЮKassa</div>
  <h2>💳 Оплата заказа</h2>

  <div class="order-info">
    <div class="order-row"><span>📦 Товар:</span><span>Звёзды Telegram</span></div>
    <div class="order-row"><span>👤 Получатель:</span><span id="recipient">—</span></div>
    <div class="order-row"><span>⭐ Количество:</span><span id="starsCount">—</span></div>
  </div>

  <div class="total">💰 <span id="totalAmount">—</span></div>

  <button class="pay-btn" id="payButton">💳 Оплатить картой (тест)</button>
  <a href="index.html" class="back-link">← Вернуться</a>

  <div class="debug" id="debugBox">⚡ Нажмите кнопку оплаты</div>
</div>

<script>
  (function() {
    // ---------------------- ЗАГРУЗКА ЗАКАЗА ----------------------
    let order = { recipient: 'тест', stars: 100, total: '164 ₽' };
    try {
      const saved = localStorage.getItem('pendingOrder');
      if (saved) {
        order = JSON.parse(saved);
        console.log('Заказ загружен:', order);
      } else {
        console.warn('Нет заказа, использую значения по умолчанию');
      }
    } catch(e) {
      console.error('Ошибка загрузки заказа', e);
    }

    document.getElementById('recipient').innerText = order.recipient || '—';
    document.getElementById('starsCount').innerText = order.stars || '—';
    document.getElementById('totalAmount').innerText = order.total || '— ₽';

    // ---------------------- РАСЧЁТ СУММЫ ----------------------
    let amountRub = 100;
    const match = (order.total || '').match(/(\d+(?:[.,]\d+)?)/);
    if (match && match[1]) {
      amountRub = parseFloat(match[1].replace(',', '.'));
    }
    if (isNaN(amountRub) || amountRub <= 0) {
      amountRub = 100;
      console.warn('Сумма не распознана, использую 100 RUB');
    }

    const description = `Покупка ${order.stars} звёзд для ${order.recipient || 'аккаунта'}`.slice(0, 120);

    // ---------------------- КЛЮЧИ ----------------------
    const SHOP_ID = '1343358';
    const SECRET_KEY = 'test_NjodJO1Gkl9oRh7mCQNmPV0-p7T9ekDH4fBXDlPWR4M';

    // ---------------------- TELEGRAM APP ----------------------
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      console.log('✅ Telegram WebApp инициализирован');
    }

    const debugBox = document.getElementById('debugBox');
    function setDebug(msg, isError = false) {
      console.log(msg);
      debugBox.innerHTML = `📡 ${new Date().toLocaleTimeString()}: ${msg}`;
      if (isError) {
        debugBox.style.background = '#3a1a2a';
      } else {
        debugBox.style.background = '#1A1A2A';
      }
    }

    // ---------------------- ОТПРАВКА ПЛАТЕЖА ----------------------
    async function createPayment() {
      const btn = document.getElementById('payButton');
      btn.disabled = true;
      btn.innerText = '⏳ Создание...';
      setDebug('Отправка запроса к прокси...');

      const paymentData = {
        amount: { value: amountRub.toFixed(2), currency: 'RUB' },
        capture: true,
        confirmation: { type: 'redirect', return_url: 'https://fastmystars.ru/success.html' },
        description: description,
        metadata: { test_mode: true }
      };

      try {
        // Используем ПОЛНЫЙ URL, чтобы избежать проблем с WebView
        const proxyUrl = 'https://fastmystars.ru/yookassa-proxy.php';
        setDebug(`→ ${proxyUrl}`);

        const response = await fetch(proxyUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(paymentData)
        });

        setDebug(`HTTP статус: ${response.status}`);

        // ⚡ КЛЮЧЕВОЙ МОМЕНТ: читаем ответ ОДИН РАЗ как текст
        const responseText = await response.text();
        setDebug(`Получен ответ (первые 100 символов): ${responseText.substring(0, 100)}`);

        // Пытаемся распарсить JSON
        let result;
        try {
          result = JSON.parse(responseText);
        } catch (parseError) {
          setDebug(`❌ Ответ не JSON: ${responseText.substring(0, 150)}`, true);
          throw new Error('Прокси вернул не JSON');
        }

        if (result.confirmation && result.confirmation.confirmation_url) {
          setDebug(`✅ Редирект на оплату...`);
          window.location.href = result.confirmation.confirmation_url;
        } else {
          const errMsg = result.description || result.error || 'Неизвестная ошибка';
          setDebug(`❌ Ошибка от ЮKassa: ${errMsg}`, true);
          throw new Error(errMsg);
        }
      } catch (err) {
        setDebug(`❌ ${err.message}`, true);
        btn.disabled = false;
        btn.innerText = '💳 Оплатить картой (тест)';
      }
    }

    document.getElementById('payButton').addEventListener('click', createPayment);
  })();
</script>
</body>
</html>
