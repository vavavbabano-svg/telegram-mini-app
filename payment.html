<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Оплата — MyStars</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #040406;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #FFFFFF;
      padding: 20px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .payment-card {
      max-width: 500px;
      width: 100%;
      background: #0F0F14;
      border-radius: 28px;
      padding: 24px 20px;
      text-align: center;
    }
    .order-info {
      background: #0B0B10;
      border-radius: 20px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .order-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 0.5px solid #2A2A35;
    }
    .total {
      font-size: 28px;
      font-weight: 700;
      color: #FFB347;
      margin: 16px 0;
    }
    .pay-btn {
      width: 100%;
      background: #2C6EDB;
      border: none;
      padding: 16px;
      border-radius: 48px;
      font-size: 17px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #8E94B0;
      font-size: 14px;
      text-decoration: none;
    }
    .info {
      background: #1E2A3A;
      border-radius: 16px;
      padding: 12px;
      margin-top: 20px;
      font-size: 12px;
      color: #A0C0F0;
    }
  </style>
</head>
<body>
<div class="payment-card">
  <h2>💳 Оплата заказа</h2>

  <div class="order-info">
    <div class="order-row"><span>📦 Товар:</span><span>Звёзды Telegram</span></div>
    <div class="order-row"><span>👤 Получатель:</span><span id="recipient">—</span></div>
    <div class="order-row"><span>⭐ Количество:</span><span id="starsCount">—</span></div>
  </div>

  <div class="total">💰 <span id="totalAmount">—</span></div>

  <button class="pay-btn" id="payBtn">Перейти к оплате</button>
  <a href="index.html" class="back-link">← Вернуться</a>

  <div class="info">
    💡 После нажатия вы перейдёте на защищённую страницу ЮKassa.<br>
    🔐 Оплата картой или через СБП.
  </div>
</div>

<script>
  // Загрузка заказа
  let order = { recipient: 'тест', stars: 100, total: '164 ₽' };
  try {
    const saved = localStorage.getItem('pendingOrder');
    if (saved) order = JSON.parse(saved);
  } catch(e) {}

  document.getElementById('recipient').innerText = order.recipient || '—';
  document.getElementById('starsCount').innerText = order.stars || '—';
  document.getElementById('totalAmount').innerText = order.total || '— ₽';

  // Извлекаем сумму
  let amount = 100;
  const match = (order.total || '').match(/(\d+(?:[.,]\d+)?)/);
  if (match) amount = parseFloat(match[1].replace(',', '.'));
  if (isNaN(amount) || amount <= 0) amount = 100;

  // Функция создания платежа (вызовет PHP-прокси)
  const payBtn = document.getElementById('payBtn');
  
  payBtn.onclick = async () => {
    payBtn.disabled = true;
    payBtn.innerText = '⏳ Создание платежа...';
    
    try {
      // Пытаемся создать платёж через наш прокси
      const response = await fetch('/yookassa-proxy.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          amount: { value: amount.toFixed(2), currency: 'RUB' },
          capture: true,
          confirmation: { type: 'redirect', return_url: 'https://fastmystars.ru/success.html' },
          description: `Покупка ${order.stars} звёзд для ${order.recipient || 'аккаунта'}`,
          metadata: { test: true }
        })
      });
      
      const data = await response.json();
      
      if (data.confirmation && data.confirmation.confirmation_url) {
        window.location.href = data.confirmation.confirmation_url;
      } else {
        throw new Error(data.description || 'Неизвестная ошибка');
      }
    } catch (err) {
      // Если прокси не работает — показываем заглушку
      payBtn.disabled = false;
      payBtn.innerText = 'Перейти к оплате';
      alert('⚠️ Платёжный сервис временно недоступен.\nПопробуйте позже или свяжитесь с поддержкой @MyStars812support_bot');
    }
  };
</script>
</body>
</html>
