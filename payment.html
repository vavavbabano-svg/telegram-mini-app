<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Оплата — MyStars</title>
  <style>
    body {
      background: #040406;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .loader {
      animation: spin 1s linear infinite;
      width: 40px;
      height: 40px;
      border: 3px solid #2A2A35;
      border-top-color: #2C6EDB;
      border-radius: 50%;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box {
      background: #5a1e2a;
      padding: 16px;
      border-radius: 16px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
<div>
  <div class="loader"></div>
  <p>⏳ Перенаправление на страницу оплаты...</p>
  <div id="errorBox" style="display:none;" class="error-box"></div>
</div>

<script>
  const order = JSON.parse(localStorage.getItem('pendingOrder') || '{}');
  let amount = 100;
  const match = (order.total || '').match(/(\d+(?:[.,]\d+)?)/);
  if (match) amount = parseFloat(match[1].replace(',', '.'));
  if (isNaN(amount) || amount <= 0) amount = 100;
  
  const description = `Покупка ${order.stars || 0} звёзд для ${order.recipient || 'аккаунта'}`.slice(0, 120);

  async function createPayment() {
    try {
      const response = await fetch('/yookassa-proxy.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          amount: { value: amount.toFixed(2), currency: 'RUB' },
          capture: true,
          confirmation: { type: 'redirect', return_url: 'https://fastmystars.ru/success.html' },
          description: description,
          metadata: { test: true }
        })
      });

      const text = await response.text();
      console.log('Raw response:', text);

      let data;
      try {
        data = JSON.parse(text);
      } catch(e) {
        document.querySelector('.loader').style.display = 'none';
        const errorBox = document.getElementById('errorBox');
        errorBox.style.display = 'block';
        errorBox.innerHTML = `❌ Ошибка: сервер вернул не JSON.<br><small>${text.substring(0, 200)}</small><br><br><button onclick="window.location.href='index.html'">← Вернуться</button>`;
        return;
      }

      if (data.confirmation?.confirmation_url) {
        window.location.href = data.confirmation.confirmation_url;
      } else {
        throw new Error(data.description || 'Неизвестная ошибка');
      }
    } catch (err) {
      document.querySelector('.loader').style.display = 'none';
      const errorBox = document.getElementById('errorBox');
      errorBox.style.display = 'block';
      errorBox.innerHTML = `❌ Ошибка: ${err.message}<br><br><button onclick="window.location.href='index.html'">← Вернуться</button>`;
    }
  }

  createPayment();
</script>
</body>
</html>
