<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #16161a;
      color: #E6E6E6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container {
      background: #1e1e24;
      border-radius: 20px;
      padding: 30px;
      max-width: 380px;
      width: 100%;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; color: #5ef57c; margin-bottom: 8px; }
    p { font-size: 14px; color: #A0A0A0; margin-bottom: 20px; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 12px;
      background: #5ef57c;
      color: #000;
      font-weight: 700;
      text-decoration: none;
      font-size: 16px;
    }
    .support {
      margin-top: 16px;
      font-size: 12px;
      color: #A0A0A0;
    }
    .support a { color: #2D6BFF; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">💳</div>
    <h1>Страница оплаты</h1>
    <p>Оплата временно осуществляется через поддержку. Напишите боту для получения реквизитов.</p>
    <a href="https://t.me/MyStars812support_bot?start=help" class="btn">Перейти в поддержку</a>
    <div class="support">
      <a href="index.html">← Вернуться в магазин</a>
    </div>
  </div>
</div>
</body>
</html>
