<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Политика</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #16161a;
      color: #E6E6E6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 0;
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #1e1e24;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .back-btn {
      background: none;
      border: none;
      color: #2D6BFF;
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .back-btn:hover { opacity: 0.8; }
    .title {
      flex: 1;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-right: 40px;
    }
    .content {
      padding: 20px;
      line-height: 1.6;
    }
    h1 { color: #5ef57c; font-size: 20px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="history.back()">← Назад</button>
    <div class="title">Политика</div>
  </div>
  <div class="content">
    <h1>Политика обработки данных</h1>
    <p>Мы собираем только Telegram ID и username для выполнения заказа. Данные не передаются третьим лицам и хранятся в зашифрованном виде.</p>
  </div>
</body>
</html>
